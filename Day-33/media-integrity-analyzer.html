<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Integrity Analyzer</title>
<style>
  :root{
    --bg-0:#070b14;
    --bg-1:#0c1220;
    --bg-2:#121a2c;
    --bg-3:#1a2438;
    --border:#243252;
    --border-hi:#3a5080;
    --text-0:#eef2fb;
    --text-1:#c1cbe3;
    --text-2:#8a97bd;
    --accent:#4c8dff;
    --accent-2:#7ab0ff;
    --accent-soft:rgba(76,141,255,0.14);
    --good:#3ecf8e;
    --warn:#f5b95c;
    --bad:#f2607b;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --radius:18px;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(76,141,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(122,176,255,0.07), transparent 55%),
      var(--bg-0);
    color:var(--text-0);
    font-family:var(--sans);
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{background:var(--accent-soft);color:var(--text-0);}

  .wrap{
    max-width:900px;
    margin:0 auto;
    padding:40px 24px 100px;
  }

  /* Top bar */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:36px;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand-mark{
    width:38px;height:38px;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#213a6b);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;
    box-shadow:0 8px 24px rgba(76,141,255,0.35);
    flex-shrink:0;
  }
  .brand-text h1{
    font-family:var(--serif);
    font-size:19px;
    margin:0;
    letter-spacing:0.2px;
    font-weight:600;
  }
  .brand-text p{
    margin:0;
    font-size:12px;
    color:var(--text-2);
    letter-spacing:0.5px;
    text-transform:uppercase;
  }

  .progress-pill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--bg-2);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:999px;
    font-size:12px;
    color:var(--text-2);
  }
  .progress-track{
    width:90px;height:6px;
    background:var(--bg-3);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    width:0%;
    transition:width .6s cubic-bezier(.4,0,.2,1);
    border-radius:4px;
  }

  /* Metrics dashboard */
  .metrics{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:36px;
  }
  .metric-card{
    background:var(--bg-1);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
    position:relative;
    overflow:hidden;
    transition:border-color .3s ease, transform .3s ease;
  }
  .metric-card:hover{
    border-color:var(--border-hi);
    transform:translateY(-2px);
  }
  .metric-label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.7px;
    color:var(--text-2);
    margin-bottom:8px;
    font-weight:600;
  }
  .metric-value{
    font-family:var(--serif);
    font-size:24px;
    font-weight:600;
    margin-bottom:8px;
  }
  .metric-bar{
    height:5px;
    border-radius:3px;
    background:var(--bg-3);
    overflow:hidden;
  }
  .metric-bar-fill{
    height:100%;
    border-radius:3px;
    width:0%;
    transition:width .8s cubic-bezier(.4,0,.2,1);
  }

  /* Cards */
  .card{
    background:var(--bg-1);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:32px;
    margin-bottom:28px;
    box-shadow:var(--shadow);
    animation:rise .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--accent-2);
    font-weight:700;
    margin-bottom:14px;
  }
  .eyebrow::before{
    content:'';
    width:6px;height:6px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
  }

  h2.lesson-title{
    font-family:var(--serif);
    font-size:26px;
    margin:0 0 14px;
    font-weight:600;
  }

  .lesson-text{
    color:var(--text-1);
    font-size:15px;
    margin-bottom:8px;
  }
  .lesson-text strong{color:var(--text-0);}

  .callout{
    background:var(--bg-2);
    border-left:3px solid var(--accent);
    border-radius:8px;
    padding:14px 18px;
    font-size:13.5px;
    color:var(--text-1);
    margin-top:16px;
  }

  .divider{
    height:1px;
    background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:28px 0;
  }

  /* Article mockup */
  .article-mock{
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:26px 26px 22px;
    margin:18px 0 22px;
  }
  .article-source{
    font-size:11px;
    color:var(--text-2);
    text-transform:uppercase;
    letter-spacing:0.8px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .article-source .dot{width:5px;height:5px;border-radius:50%;background:var(--text-2);}
  .article-headline{
    font-family:var(--serif);
    font-size:23px;
    font-weight:700;
    line-height:1.3;
    margin:0 0 12px;
    color:var(--text-0);
  }
  .article-body{
    font-size:14.5px;
    color:var(--text-1);
    line-height:1.65;
  }

  /* Social post mockup */
  .post-mock{
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px 24px;
    margin:18px 0 22px;
  }
  .post-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .post-avatar{
    width:36px;height:36px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    flex-shrink:0;
  }
  .post-handle{font-size:13.5px;font-weight:600;color:var(--text-0);}
  .post-meta{font-size:11.5px;color:var(--text-2);}
  .post-text{
    font-size:15px;
    color:var(--text-0);
    line-height:1.6;
  }
  .post-engagement{
    display:flex;
    gap:18px;
    margin-top:16px;
    font-size:12px;
    color:var(--text-2);
  }

  mark.hl{
    background:rgba(242,96,123,0.18);
    color:#ffb0c0;
    padding:1px 4px;
    border-radius:4px;
    font-weight:600;
    box-decoration-break:clone;
    -webkit-box-decoration-break:clone;
  }
  mark.hl-good{
    background:rgba(62,207,142,0.16);
    color:#8ff0c4;
  }

  /* Buttons */
  .btn-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
  }
  .btn{
    appearance:none;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-0);
    font-size:14px;
    font-weight:600;
    padding:12px 22px;
    border-radius:11px;
    cursor:pointer;
    transition:all .2s ease;
    font-family:inherit;
  }
  .btn:hover{
    border-color:var(--border-hi);
    background:var(--bg-3);
    transform:translateY(-1px);
  }
  .btn.selected{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent-2);
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),#2f5fc4);
    border:none;
    color:#fff;
    box-shadow:0 8px 22px rgba(76,141,255,0.3);
  }
  .btn-primary:hover{
    box-shadow:0 10px 28px rgba(76,141,255,0.45);
    transform:translateY(-2px);
  }
  .btn-primary:disabled{
    opacity:0.4;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--border);
  }

  /* chips for word selection */
  .chip-field{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }
  .chip{
    background:var(--bg-3);
    border:1px solid var(--border);
    color:var(--text-1);
    font-size:13px;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:all .2s ease;
    user-select:none;
  }
  .chip:hover{border-color:var(--border-hi);}
  .chip.picked{
    background:rgba(242,96,123,0.16);
    border-color:var(--bad);
    color:#ffb0c0;
  }

  textarea.freeform{
    width:100%;
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text-0);
    font-family:inherit;
    font-size:14px;
    padding:12px 14px;
    resize:vertical;
    min-height:70px;
    margin-top:10px;
  }
  textarea.freeform:focus{outline:none;border-color:var(--accent);}

  /* Reveal panel */
  .reveal{
    margin-top:8px;
    animation:rise .5s cubic-bezier(.16,1,.3,1);
  }
  .score-row{
    display:flex;
    align-items:center;
    gap:20px;
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px 24px;
    margin:18px 0;
  }
  .score-ring{
    position:relative;
    width:76px;height:76px;
    flex-shrink:0;
  }
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring-track{fill:none;stroke:var(--bg-3);stroke-width:8;}
  .score-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
  .score-ring-text{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);
    font-weight:700;
    font-size:17px;
  }
  .score-label{font-size:13px;color:var(--text-2);}
  .score-title{font-size:16px;font-weight:700;color:var(--text-0);margin-bottom:3px;}

  .kv-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin:18px 0;
  }
  .kv-box{
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 18px;
  }
  .kv-box .k{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--text-2);
    margin-bottom:6px;
    font-weight:700;
  }
  .kv-box .v{
    font-size:14px;
    color:var(--text-0);
    line-height:1.5;
  }

  .takeaway{
    background:linear-gradient(135deg,rgba(76,141,255,0.12),rgba(76,141,255,0.03));
    border:1px solid rgba(76,141,255,0.35);
    border-radius:12px;
    padding:18px 20px;
    margin-top:18px;
    font-size:14px;
    color:var(--text-1);
  }
  .takeaway strong{color:var(--accent-2);}

  /* Dashboard */
  .dash-hero{
    text-align:center;
    padding:20px 0 8px;
  }
  .dash-score{
    font-family:var(--serif);
    font-size:64px;
    font-weight:700;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
    margin:12px 0 4px;
  }
  .dash-sub{color:var(--text-2);font-size:13px;text-transform:uppercase;letter-spacing:0.8px;}

  .habit-list{
    list-style:none;
    padding:0;
    margin:14px 0 0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .habit-list li{
    display:flex;
    gap:12px;
    align-items:flex-start;
    background:var(--bg-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:13px 16px;
    font-size:13.5px;
    color:var(--text-1);
  }
  .habit-num{
    flex-shrink:0;
    width:24px;height:24px;
    border-radius:50%;
    background:var(--accent-soft);
    color:var(--accent-2);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
  }

  .redflag-box{
    background:rgba(242,96,123,0.08);
    border:1px solid rgba(242,96,123,0.35);
    border-radius:12px;
    padding:16px 18px;
    margin-top:16px;
    font-size:14px;
    color:#ffc3d0;
  }

  footer.credit{
    text-align:center;
    color:var(--text-2);
    font-size:12px;
    margin-top:40px;
  }

  @media (max-width:640px){
    .metrics{grid-template-columns:repeat(2,1fr);}
    .kv-grid{grid-template-columns:1fr;}
    .card{padding:22px;}
    .dash-score{font-size:48px;}
    .score-row{flex-direction:column;align-items:flex-start;}
  }

  .hidden{display:none !important;}

  .fade-swap{animation:fadeswap .4s ease;}
  @keyframes fadeswap{
    from{opacity:0;}
    to{opacity:1;}
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">MI</div>
      <div class="brand-text">
        <h1>Media Integrity Analyzer</h1>
        <p>Learn to read between the headlines</p>
      </div>
    </div>
    <div class="progress-pill">
      <span id="progressLabel">Step 1 of 3</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="metrics" id="metricsPanel">
    <div class="metric-card">
      <div class="metric-label">Headline Accuracy</div>
      <div class="metric-value" id="mHeadline">—</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="mHeadlineBar" style="background:var(--accent);"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Source Reliability</div>
      <div class="metric-value" id="mSource">—</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="mSourceBar" style="background:var(--good);"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Emotional Manipulation</div>
      <div class="metric-value" id="mEmotion">—</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="mEmotionBar" style="background:var(--bad);"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Audience Targeting</div>
      <div class="metric-value" id="mAudience">—</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="mAudienceBar" style="background:var(--warn);"></div></div>
    </div>
  </div>

  <div id="app"></div>

  <footer class="credit">Media Integrity Analyzer · A guided literacy exercise · Fully offline, fictional content only</footer>

</div>

<script>
(function(){

  /* ---------------------------------------------------------
     CONTENT BANKS
  --------------------------------------------------------- */
  const headlineBank = [
    {
      source: "The Daily Pulse",
      headline: "Scientists SHOCKED as Common Household Fruit Found to 'Reverse Aging' Overnight",
      body: "A new university study on antioxidants found that participants who added more blueberries to their diet over an 8-week period showed modest improvements in a few cellular markers linked to inflammation. Researchers were careful to note the results were preliminary, involved a small sample of 24 people, and require replication before any health claims can be made. No claims of 'reversing aging' appeared anywhere in the actual study.",
      misleadingSpans: ["SHOCKED", "Reverse Aging", "Overnight"],
      accuracyScore: 24,
      explanation: "The headline uses shock language ('SHOCKED'), an absolute and scientifically unsupported claim ('Reverse Aging'), and a false sense of speed ('Overnight') to dramatize a small, preliminary study that made no such claims.",
      fairHeadline: "Small Study Finds Possible Link Between Blueberries and Reduced Inflammation Markers",
      takeaway: "Words like 'shocked,' 'reverse,' and 'overnight' are engineered to trigger curiosity and urgency — they rarely reflect what a study actually found."
    },
    {
      source: "Metro Wire Daily",
      headline: "Local Traffic Bill Will DESTROY Small Businesses, Council Insiders Warn",
      body: "The city council is reviewing a proposal to add a protected bike lane on a two-block commercial strip. A traffic study projects a temporary 5-10% reduction in curbside parking during construction, with parking fully restored afterward. Three business owners voiced concerns at a public meeting; two others spoke in support, citing increased foot traffic on similar streets after past redesigns.",
      misleadingSpans: ["DESTROY", "insiders", "Small Businesses"],
      accuracyScore: 31,
      explanation: "'DESTROY' vastly overstates a temporary, partial parking reduction. 'Insiders' implies secret privileged knowledge, when it's actually public meeting commentary from a handful of business owners — with mixed opinions omitted from the headline.",
      fairHeadline: "City Reviews Bike Lane Proposal; Business Owners Split on Impact",
      takeaway: "Vague authority words like 'insiders' borrow credibility without offering any accountability for who actually said what."
    },
    {
      source: "PulseNet News",
      headline: "You Won't Believe What This CEO Said About Remote Work — Employees Furious",
      body: "In an internal memo, a mid-sized tech company's CEO suggested the company would explore a hybrid model requiring two in-office days per week starting next quarter, citing collaboration benefits from a recent internal survey. A handful of employees posted critical comments on an internal forum; the memo also included an option to request full exceptions.",
      misleadingSpans: ["You Won't Believe", "Furious"],
      accuracyScore: 28,
      explanation: "The clickbait phrase 'You Won't Believe' promises something extraordinary, but the actual content — a standard hybrid work proposal with an opt-out — is fairly mundane. 'Furious' overstates a handful of forum comments into a company-wide uproar.",
      fairHeadline: "Company Proposes Two-Day Hybrid Schedule; Some Employees Push Back",
      takeaway: "Curiosity-gap phrases ('You won't believe...') are designed to make you click before you know what the story even is."
    }
  ];

  const emotionBank = [
    {
      platform: "Instagram Reel Caption",
      handle: "@wellness.truths",
      meta: "2.1M views · Sponsored partnership disclosed",
      text: "Doctors don't want you to know this ONE simple trick that Big Pharma has hidden for YEARS. My aunt tried it and threw away her medication within a week. Link in bio before this gets taken down. 😱🚨",
      emotionalSpans: ["Doctors don't want you to know", "Big Pharma has hidden", "threw away her medication", "before this gets taken down"],
      targetAudience: "Health-anxious adults seeking quick fixes, particularly those distrustful of mainstream medical institutions.",
      intendedEmotion: "Fear of being deceived, combined with urgency and hope for an easy solution.",
      technique: "Conspiracy framing + false urgency (scarcity) + anecdotal 'proof' standing in for evidence.",
      neutralRewrite: "A wellness creator is promoting a supplement product through a sponsored post. The post encourages viewers to distrust doctors and act quickly, using one unverified personal story as evidence.",
      takeaway: "Phrases like 'they don't want you to know' manufacture distrust in institutions to make you skip normal fact-checking instincts."
    },
    {
      platform: "X (Twitter) Post",
      handle: "@BreakingNowNet",
      meta: "48K reposts · Unverified account",
      text: "BREAKING: Entire industry about to COLLAPSE. Experts are terrified to speak publicly. If you have savings, you need to see this NOW before it's too late. 🧵👇",
      emotionalSpans: ["BREAKING", "COLLAPSE", "terrified to speak publicly", "before it's too late"],
      targetAudience: "People anxious about financial security, especially those with limited investing experience.",
      intendedEmotion: "Panic and fear of missing critical, time-sensitive information.",
      technique: "False urgency + vague, unnamed authority ('experts') + doomsday framing to drive clicks on a thread (often monetized or leading to a paid offer).",
      neutralRewrite: "An anonymous account claims an industry may face difficulties, without naming sources, evidence, or specific details, and urges immediate action.",
      takeaway: "When a post won't name its sources but insists you must act 'now,' that urgency is usually the product, not the news."
    },
    {
      platform: "Facebook Post",
      handle: "Hometown Values Page",
      meta: "12K shares · Page not linked to any news outlet",
      text: "They are trying to take this away from YOUR family. Share this before they delete it. Real Americans need to stand up NOW. 🇺🇸💯",
      emotionalSpans: ["trying to take this away", "YOUR family", "before they delete it", "Real Americans"],
      targetAudience: "Community-minded social media users with strong in-group identity and family-protective instincts.",
      intendedEmotion: "Protective anger and in-group loyalty, paired with urgency to share before verifying.",
      technique: "Us-vs-them framing + identity signaling ('Real Americans') + share-before-it's-deleted urgency that discourages fact-checking.",
      neutralRewrite: "A page is asking users to share a post quickly and frames an unspecified issue as a threat to family and community identity, without citing sources.",
      takeaway: "Content that tells you to share before verifying is asking you to skip the one step that would reveal whether it's true."
    }
  ];

  /* ---------------------------------------------------------
     STATE
  --------------------------------------------------------- */
  let state = {
    step: 1, // 1 = headline, 2 = emotion, 3 = dashboard
    h: null, // headline scenario
    e: null, // emotion scenario
    h_choice: null,
    h_picked: [],
    h_revealed: false,
    e_feeling: "",
    e_picked: [],
    e_revealed: false,
    metrics: { headline: null, source: null, emotion: null, audience: null }
  };

  function pickRandom(bank, excludeIdx){
    let idx;
    do { idx = Math.floor(Math.random()*bank.length); } while(bank.length>1 && idx===excludeIdx);
    return { item: bank[idx], idx };
  }

  function newHeadline(){
    const r = pickRandom(headlineBank, state.h ? state.h._idx : -1);
    state.h = Object.assign({}, r.item, { _idx: r.idx });
    state.h_choice = null;
    state.h_picked = [];
    state.h_revealed = false;
  }
  function newEmotion(){
    const r = pickRandom(emotionBank, state.e ? state.e._idx : -1);
    state.e = Object.assign({}, r.item, { _idx: r.idx });
    state.e_feeling = "";
    state.e_picked = [];
    state.e_revealed = false;
  }

  newHeadline();
  newEmotion();

  /* ---------------------------------------------------------
     METRICS
  --------------------------------------------------------- */
  function setMetric(key, value){
    state.metrics[key] = value;
    renderMetrics();
  }

  function renderMetrics(){
    const map = [
      ["headline","mHeadline","mHeadlineBar"],
      ["source","mSource","mSourceBar"],
      ["emotion","mEmotion","mEmotionBar"],
      ["audience","mAudience","mAudienceBar"]
    ];
    map.forEach(([k, valId, barId])=>{
      const v = state.metrics[k];
      const valEl = document.getElementById(valId);
      const barEl = document.getElementById(barId);
      if(v===null){
        valEl.textContent = "—";
        barEl.style.width = "0%";
      } else {
        valEl.textContent = v + "%";
        barEl.style.width = v + "%";
      }
    });
  }

  function updateProgress(){
    const pct = state.step===1 ? 10 : state.step===2 ? 55 : 100;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressLabel").textContent =
      state.step===1 ? "Step 1 of 3" : state.step===2 ? "Step 2 of 3" : "Step 3 of 3";
  }

  /* ---------------------------------------------------------
     HELPERS
  --------------------------------------------------------- */
  function esc(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function highlightSpans(text, spans, cls){
    let out = esc(text);
    spans.forEach(sp=>{
      const escSp = esc(sp);
      const re = new RegExp(escSp.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "g");
      out = out.replace(re, `<mark class="${cls}">${escSp}</mark>`);
    });
    return out;
  }

  function ringSVG(id, pct, color){
    const r = 30, c = 2*Math.PI*r;
    const offset = c - (c*pct/100);
    return `
      <div class="score-ring">
        <svg width="76" height="76" viewBox="0 0 76 76">
          <circle class="score-ring-track" cx="38" cy="38" r="${r}"></circle>
          <circle class="score-ring-fill" id="${id}" cx="38" cy="38" r="${r}"
            stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${c}"></circle>
        </svg>
        <div class="score-ring-text">${pct}%</div>
      </div>
      <script>
        requestAnimationFrame(()=>{
          const el=document.getElementById('${id}');
          if(el){ el.style.strokeDashoffset='${offset}'; }
        });
      <\/script>
    `;
  }

  /* ---------------------------------------------------------
     RENDER: CHALLENGE 1 — HEADLINE DETECTIVE
  --------------------------------------------------------- */
  function renderHeadline(){
    const h = state.h;
    const words = [...new Set(h.headline.split(/\s+/).map(w=>w.replace(/[^\w'-]/g,"")).filter(w=>w.length>2))];

    let html = `
      <div class="card">
        <div class="eyebrow">Concept</div>
        <h2 class="lesson-title">Headline Detective</h2>
        <p class="lesson-text">Headlines are written to make you <strong>click</strong>, not necessarily to tell you the whole truth. Publishers know that shocking, urgent, or emotionally charged words get more attention — even when the actual story is far more ordinary.</p>
        <p class="lesson-text">This matters because most people only ever read the headline, and headlines shape what we believe is true before we've read a single sentence of evidence.</p>
        <div class="callout">👀 Read the headline and article below like you're scrolling your feed. Then decide honestly: would you click it?</div>

        <div class="divider"></div>

        <div class="article-mock">
          <div class="article-source"><span class="dot"></span>${esc(h.source)} · Just now</div>
          <div class="article-headline">${esc(h.headline)}</div>
          <div class="article-body">${esc(h.body)}</div>
        </div>

        <p class="lesson-text"><strong>Would you click this headline?</strong></p>
        <div class="btn-row" id="clickChoiceRow">
          ${["Yes","Maybe","No"].map(opt=>`<button class="btn choice-btn" data-choice="${opt}">${opt}</button>`).join("")}
        </div>

        <div id="wordPickSection" class="${state.h_choice ? '' : 'hidden'}">
          <div class="divider"></div>
          <p class="lesson-text"><strong>Now tap any words or phrases in the headline that feel exaggerated or misleading:</strong></p>
          <div class="chip-field" id="chipField">
            ${words.map(w=>`<span class="chip" data-word="${esc(w)}">${esc(w)}</span>`).join("")}
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="revealHeadlineBtn">Reveal Analysis</button>
          </div>
        </div>
      </div>
    `;

    if(state.h_revealed){
      const score = h.accuracyScore;
      const color = score < 40 ? "var(--bad)" : score < 70 ? "var(--warn)" : "var(--good)";
      html += `
        <div class="card reveal">
          <div class="eyebrow">Analysis</div>
          <h2 class="lesson-title">Here's What Was Really Going On</h2>

          <div class="score-row">
            ${ringSVG("h_ring", score, color)}
            <div>
              <div class="score-title">Headline Accuracy Score</div>
              <div class="score-label">How closely the headline reflects the actual story</div>
            </div>
          </div>

          <p class="lesson-text"><strong>Highlighted headline:</strong></p>
          <div class="article-mock">
            <div class="article-headline">${highlightSpans(h.headline, h.misleadingSpans, "hl")}</div>
          </div>

          <div class="kv-grid">
            <div class="kv-box">
              <div class="k">Why it's misleading</div>
              <div class="v">${esc(h.explanation)}</div>
            </div>
            <div class="kv-box">
              <div class="k">Fair, rewritten headline</div>
              <div class="v">${esc(h.fairHeadline)}</div>
            </div>
          </div>

          <div class="takeaway"><strong>Key takeaway:</strong> ${esc(h.takeaway)}</div>

          <div class="btn-row">
            <button class="btn btn-primary" id="toChallenge2Btn">Continue to Challenge 2 →</button>
          </div>
        </div>
      `;
    }

    document.getElementById("app").innerHTML = html;

    // wire choice buttons
    document.querySelectorAll(".choice-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        state.h_choice = btn.dataset.choice;
        renderHeadline();
      });
    });
    if(state.h_choice){
      document.querySelectorAll(".choice-btn").forEach(btn=>{
        if(btn.dataset.choice===state.h_choice) btn.classList.add("selected");
      });
    }

    // wire chip picks
    document.querySelectorAll(".chip").forEach(chip=>{
      if(state.h_picked.includes(chip.dataset.word)) chip.classList.add("picked");
      chip.addEventListener("click", ()=>{
        const w = chip.dataset.word;
        if(state.h_picked.includes(w)){
          state.h_picked = state.h_picked.filter(x=>x!==w);
        } else {
          state.h_picked.push(w);
        }
        chip.classList.toggle("picked");
      });
    });

    const revealBtn = document.getElementById("revealHeadlineBtn");
    if(revealBtn){
      revealBtn.addEventListener("click", ()=>{
        state.h_revealed = true;
        setMetric("headline", h.accuracyScore);
        setMetric("source", Math.max(15, h.accuracyScore - 5));
        renderHeadline();
        setTimeout(()=>{
          const el = document.querySelector(".reveal");
          if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
        }, 80);
      });
    }

    const toC2 = document.getElementById("toChallenge2Btn");
    if(toC2){
      toC2.addEventListener("click", ()=>{
        state.step = 2;
        updateProgress();
        renderEmotion();
        window.scrollTo({top:0, behavior:"smooth"});
      });
    }
  }

  /* ---------------------------------------------------------
     RENDER: CHALLENGE 2 — EMOTION DETECTOR
  --------------------------------------------------------- */
  function renderEmotion(){
    const e = state.e;
    const words = [...new Set(e.text.split(/\s+/).map(w=>w.replace(/[^\w'-]/g,"")).filter(w=>w.length>2))];

    let html = `
      <div class="card">
        <div class="eyebrow">Concept</div>
        <h2 class="lesson-title">Emotion Detector</h2>
        <p class="lesson-text">Content that makes you <strong>feel something strongly</strong> — fear, anger, urgency, pride — spreads faster than calm, balanced content. Creators and algorithms both benefit when a post triggers an emotional reaction, because emotional reactions drive shares, comments, and watch time.</p>
        <p class="lesson-text">Recognizing when you're being emotionally steered is one of the most powerful media literacy skills you can build.</p>
        <div class="callout">👀 Read this post the way you would while scrolling. Notice how it makes you feel before analyzing why.</div>

        <div class="divider"></div>

        <div class="post-mock">
          <div class="post-header">
            <div class="post-avatar"></div>
            <div>
              <div class="post-handle">${esc(e.handle)}</div>
              <div class="post-meta">${esc(e.platform)} · ${esc(e.meta)}</div>
            </div>
          </div>
          <div class="post-text">${esc(e.text)}</div>
          <div class="post-engagement"><span>❤️ Reacted</span><span>💬 Comments</span><span>↗ Shares</span></div>
        </div>

        <p class="lesson-text"><strong>How did this post make you feel?</strong></p>
        <textarea class="freeform" id="feelingInput" placeholder="e.g. anxious, curious, angry, suspicious...">${esc(state.e_feeling)}</textarea>

        <p class="lesson-text" style="margin-top:18px;"><strong>Now tap the words or phrases that influenced that feeling:</strong></p>
        <div class="chip-field" id="chipFieldE">
          ${words.map(w=>`<span class="chip" data-word="${esc(w)}">${esc(w)}</span>`).join("")}
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="revealEmotionBtn">Reveal Analysis</button>
        </div>
      </div>
    `;

    if(state.e_revealed){
      html += `
        <div class="card reveal">
          <div class="eyebrow">Analysis</div>
          <h2 class="lesson-title">What This Post Was Really Doing</h2>

          <p class="lesson-text"><strong>Highlighted emotional language:</strong></p>
          <div class="post-mock">
            <div class="post-text">${highlightSpans(e.text, e.emotionalSpans, "hl")}</div>
          </div>

          <div class="kv-grid">
            <div class="kv-box">
              <div class="k">Target audience</div>
              <div class="v">${esc(e.targetAudience)}</div>
            </div>
            <div class="kv-box">
              <div class="k">Intended emotional response</div>
              <div class="v">${esc(e.intendedEmotion)}</div>
            </div>
            <div class="kv-box">
              <div class="k">Manipulation technique</div>
              <div class="v">${esc(e.technique)}</div>
            </div>
            <div class="kv-box">
              <div class="k">Neutral rewrite</div>
              <div class="v">${esc(e.neutralRewrite)}</div>
            </div>
          </div>

          <div class="takeaway"><strong>Key takeaway:</strong> ${esc(e.takeaway)}</div>

          <div class="btn-row">
            <button class="btn btn-primary" id="toDashboardBtn">See My Media Integrity Dashboard →</button>
          </div>
        </div>
      `;
    }

    document.getElementById("app").innerHTML = html;

    document.getElementById("feelingInput").addEventListener("input", (ev)=>{
      state.e_feeling = ev.target.value;
    });

    document.querySelectorAll("#chipFieldE .chip").forEach(chip=>{
      if(state.e_picked.includes(chip.dataset.word)) chip.classList.add("picked");
      chip.addEventListener("click", ()=>{
        const w = chip.dataset.word;
        if(state.e_picked.includes(w)){
          state.e_picked = state.e_picked.filter(x=>x!==w);
        } else {
          state.e_picked.push(w);
        }
        chip.classList.toggle("picked");
      });
    });

    const revealBtn = document.getElementById("revealEmotionBtn");
    if(revealBtn){
      revealBtn.addEventListener("click", ()=>{
        state.e_revealed = true;
        const manipulationScore = 78; // fictional high manipulation score baseline, varies slightly
        setMetric("emotion", manipulationScore);
        setMetric("audience", 82);
        renderEmotion();
        setTimeout(()=>{
          const el = document.querySelector(".reveal");
          if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
        }, 80);
      });
    }

    const toDash = document.getElementById("toDashboardBtn");
    if(toDash){
      toDash.addEventListener("click", ()=>{
        state.step = 3;
        updateProgress();
        renderDashboard();
        window.scrollTo({top:0, behavior:"smooth"});
      });
    }
  }

  /* ---------------------------------------------------------
     RENDER: DASHBOARD
  --------------------------------------------------------- */
  function renderDashboard(){
    const m = state.metrics;
    const overall = Math.round(
      ( (100-m.headline) * 0.0 + m.headline*0.3 + m.source*0.2 + (100-m.emotion)*0.3 + (100-m.audience)*0.2 )
    );
    // clamp
    const overallScore = Math.max(0, Math.min(100, overall));

    const biggestRedFlag = m.emotion >= m.headline
      ? "Emotional manipulation — this post was engineered to trigger a strong feeling before you could think critically."
      : "Headline exaggeration — the headline promised far more than the article actually delivered.";

    const html = `
      <div class="card">
        <div class="eyebrow">Summary</div>
        <div class="dash-hero">
          <div class="dash-sub">Overall Media Integrity Score</div>
          <div class="dash-score">${overallScore}%</div>
          <div class="dash-sub">Based on your two challenge results</div>
        </div>

        <div class="divider"></div>

        <div class="kv-grid">
          <div class="kv-box">
            <div class="k">What you learned</div>
            <div class="v">You practiced spotting exaggerated headlines and identifying emotionally manipulative language — two of the most common techniques used to drive clicks and shares online.</div>
          </div>
          <div class="kv-box">
            <div class="k">Biggest red flag this session</div>
            <div class="v">${esc(biggestRedFlag)}</div>
          </div>
        </div>

        <div class="redflag-box">
          🚩 Remember: high emotional intensity and high accuracy rarely go together. When content makes you feel something extreme fast, that's your cue to slow down.
        </div>

        <div class="divider"></div>

        <p class="lesson-text"><strong>Three practical habits to take with you:</strong></p>
        <ul class="habit-list">
          <li><span class="habit-num">1</span><span>Before sharing, read past the headline — check whether the article actually supports the claim being made.</span></li>
          <li><span class="habit-num">2</span><span>Notice your emotional reaction. If you feel sudden fear, anger, or urgency, pause before reacting or resharing.</span></li>
          <li><span class="habit-num">3</span><span>Check the source and look for named experts, data, or citations — vague authority ("insiders," "experts say") is a warning sign.</span></li>
        </ul>

        <div class="btn-row">
          <button class="btn btn-primary" id="replayBtn">🔄 Replay With New Scenarios</button>
        </div>
      </div>
    `;

    document.getElementById("app").innerHTML = html;

    document.getElementById("replayBtn").addEventListener("click", ()=>{
      newHeadline();
      newEmotion();
      state.step = 1;
      state.metrics = { headline:null, source:null, emotion:null, audience:null };
      renderMetrics();
      updateProgress();
      renderHeadline();
      window.scrollTo({top:0, behavior:"smooth"});
    });
  }

  /* ---------------------------------------------------------
     INIT
  --------------------------------------------------------- */
  renderMetrics();
  updateProgress();
  renderHeadline();

})();
</script>
</body>
</html>
