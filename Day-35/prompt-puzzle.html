<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Prompt Puzzle — Master AI Prompting Through Play</title>
<style>
  :root{
    --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
    --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
    --good:#10b981; --bad:#ef4444; --warn:#f59e0b;
    --card:#1a1a2e; --card2:#20203a; --text:#e8e8f5; --muted:#9a9ac0;
    --glass: rgba(255,255,255,0.06);
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }
  #app{max-width:1100px; margin:0 auto; padding:24px 16px 80px;}
  .hidden{display:none !important;}

  /* ---------- Header ---------- */
  .app-header{
    text-align:center; padding:20px 0 30px; animation:fadeDown .6s ease;
  }
  .app-header h1{
    font-size:2.1rem; font-weight:800;
    background:linear-gradient(90deg, #a78bfa, #22d3ee, #fbbf24);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:-0.5px;
  }
  .app-header p{color:var(--muted); margin-top:6px; font-size:0.95rem;}

  @keyframes fadeDown{from{opacity:0; transform:translateY(-16px);} to{opacity:1; transform:translateY(0);}}
  @keyframes fadeUp{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);}}
  @keyframes pop{0%{transform:scale(.9); opacity:0;} 100%{transform:scale(1); opacity:1;}}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.4);} 50%{box-shadow:0 0 0 10px rgba(124,58,237,0);}}
  @keyframes shake{10%,90%{transform:translateX(-1px);}20%,80%{transform:translateX(2px);}30%,50%,70%{transform:translateX(-4px);}40%,60%{transform:translateX(4px);}}
  @keyframes floatUp{0%{opacity:0; transform:translate(-50%,10px) scale(.9);}15%{opacity:1; transform:translate(-50%,0) scale(1);}80%{opacity:1;}100%{opacity:0; transform:translate(-50%,-30px) scale(.95);}}
  @keyframes countUp{from{transform:scale(1.4); color:var(--accent3);} to{transform:scale(1); color:var(--text);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes shimmer{0%{background-position:-200% 0;} 100%{background-position:200% 0;}}

  /* ---------- Cards / Glass ---------- */
  .glass{
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius);
    backdrop-filter:blur(10px);
  }
  .card{
    background:linear-gradient(160deg, var(--card), var(--card2));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:var(--radius);
    padding:20px;
  }

  /* ---------- Buttons ---------- */
  .btn{
    cursor:pointer; border:none; border-radius:12px; padding:12px 22px;
    font-size:0.95rem; font-weight:600; color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    box-shadow:0 4px 14px rgba(124,58,237,0.35);
  }
  .btn:hover{transform:translateY(-2px); filter:brightness(1.1); box-shadow:0 6px 20px rgba(124,58,237,0.5);}
  .btn:active{transform:translateY(0px) scale(.98);}
  .btn.secondary{background:rgba(255,255,255,0.08); box-shadow:none;}
  .btn.secondary:hover{background:rgba(255,255,255,0.15);}
  .btn.small{padding:8px 14px; font-size:0.82rem;}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

  /* ---------- Setup Screen ---------- */
  .setup-card{padding:32px; animation:fadeUp .5s ease;}
  .option-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin:18px 0 26px;}
  .option-tile{
    padding:16px; border-radius:14px; cursor:pointer; text-align:left;
    border:2px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03);
    transition:all .2s ease; position:relative;
  }
  .option-tile:hover{border-color:var(--accent2); transform:translateY(-3px); background:rgba(255,255,255,0.06);}
  .option-tile.selected{border-color:var(--accent); background:linear-gradient(135deg, rgba(124,58,237,0.25), rgba(6,182,212,0.15)); animation:pulseGlow 1.5s infinite;}
  .option-tile .icon{font-size:1.4rem; margin-bottom:6px; display:block;}
  .option-tile .name{font-weight:700; font-size:1rem;}
  .option-tile .desc{font-size:0.78rem; color:var(--muted); margin-top:4px;}
  .section-label{font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--accent2); font-weight:700; margin-bottom:6px;}

  /* ---------- Progress Bar ---------- */
  .progress-wrap{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .progress-track{flex:1; height:8px; border-radius:6px; background:rgba(255,255,255,0.08); overflow:hidden;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:6px; transition:width .4s ease;}
  .progress-text{font-size:0.8rem; color:var(--muted); white-space:nowrap;}

  /* ---------- Stats bar ---------- */
  .stats-bar{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
  .stat-chip{
    padding:8px 14px; border-radius:10px; background:rgba(255,255,255,0.05);
    font-size:0.8rem; display:flex; gap:6px; align-items:center; border:1px solid rgba(255,255,255,0.06);
  }
  .stat-chip b{color:#fff; animation:countUp .3s ease;}

  /* ---------- Scenario Card ---------- */
  .scenario-header{margin-bottom:16px;}
  .badge{
    display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.72rem; font-weight:700;
    background:rgba(124,58,237,0.25); color:#c4b5fd; margin-right:6px; text-transform:uppercase; letter-spacing:.5px;
  }
  .badge.type-build{background:rgba(16,185,129,0.2); color:#6ee7b7;}
  .badge.type-clean{background:rgba(245,158,11,0.2); color:#fcd34d;}
  .badge.type-choose{background:rgba(6,182,212,0.2); color:#67e8f9;}
  .scenario-title{font-size:1.25rem; font-weight:800; margin:8px 0 6px;}
  .scenario-desc{color:var(--muted); font-size:0.9rem; line-height:1.5;}
  .desired-output{
    margin-top:14px; padding:14px; border-radius:12px; background:rgba(6,182,212,0.08);
    border-left:3px solid var(--accent2); font-size:0.88rem; line-height:1.5;
  }
  .desired-output b{color:var(--accent2);}

  /* ---------- Drag & Drop ---------- */
  .dnd-area{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;}
  @media (max-width:720px){.dnd-area{grid-template-columns:1fr;}}
  .dnd-col h4{font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px;}
  .drop-zone{
    min-height:220px; border:2px dashed rgba(255,255,255,0.15); border-radius:14px; padding:12px;
    display:flex; flex-direction:column; gap:8px; transition:all .2s ease; background:rgba(255,255,255,0.02);
  }
  .drop-zone.dragover{border-color:var(--accent2); background:rgba(6,182,212,0.08);}
  .block-pool{
    display:flex; flex-direction:column; gap:8px; min-height:220px;
    border-radius:14px; padding:12px; background:rgba(255,255,255,0.02); border:2px dashed rgba(255,255,255,0.06);
  }
  .block{
    padding:12px 14px; border-radius:10px; cursor:grab; font-size:0.86rem; line-height:1.4;
    background:linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
    border:1px solid rgba(255,255,255,0.1); transition:transform .15s ease, box-shadow .15s ease;
    user-select:none;
  }
  .block:hover{transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.3);}
  .block.dragging{opacity:0.4;}
  .block.correct-flash{animation:pop .3s ease; border-color:var(--good); background:rgba(16,185,129,0.15);}
  .block.wrong-flash{animation:shake .4s ease; border-color:var(--bad); background:rgba(239,68,68,0.15);}
  .block .tag{font-size:0.65rem; color:var(--accent3); font-weight:700; text-transform:uppercase; display:block; margin-bottom:3px;}

  /* Clean prompt: text with removable chunks */
  .clean-text{
    padding:16px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
    font-size:0.92rem; line-height:2; margin-top:16px;
  }
  .chunk{
    display:inline-block; padding:3px 8px; margin:2px; border-radius:6px; cursor:pointer;
    transition:all .15s ease; border:1px solid transparent;
  }
  .chunk.weak{background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.4);}
  .chunk.weak:hover{background:rgba(239,68,68,0.3); transform:scale(1.03);}
  .chunk.good{background:transparent;}
  .chunk.removed{text-decoration:line-through; opacity:0.3; cursor:default;}

  /* Choose best */
  .choice-grid{display:flex; flex-direction:column; gap:14px; margin-top:18px;}
  .choice-card{
    padding:16px; border-radius:14px; border:2px solid rgba(255,255,255,0.08); cursor:pointer;
    background:rgba(255,255,255,0.02); transition:all .2s ease;
  }
  .choice-card:hover{border-color:var(--accent2); transform:translateX(4px);}
  .choice-card.chosen-correct{border-color:var(--good); background:rgba(16,185,129,0.1);}
  .choice-card.chosen-wrong{border-color:var(--bad); background:rgba(239,68,68,0.1); animation:shake .4s ease;}
  .choice-card .label{font-size:0.72rem; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px;}
  .choice-card .txt{font-size:0.88rem; line-height:1.5;}

  /* ---------- Feedback panel ---------- */
  .feedback-panel{
    margin-top:20px; padding:16px; border-radius:12px; display:none; animation:fadeUp .4s ease;
  }
  .feedback-panel.show{display:block;}
  .feedback-panel.correct{background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.4);}
  .feedback-panel.partial{background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4);}
  .feedback-panel .principle{margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,0.15); font-size:0.85rem; color:var(--muted);}
  .out-compare{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;}
  @media (max-width:720px){.out-compare{grid-template-columns:1fr;}}
  .out-box{padding:10px 12px; border-radius:10px; font-size:0.82rem; line-height:1.5;}
  .out-box.weak{background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25);}
  .out-box.opt{background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.25);}
  .out-box .lbl{font-weight:700; font-size:0.72rem; text-transform:uppercase; margin-bottom:4px; display:block;}

  .actions-row{display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px; flex-wrap:wrap;}

  /* ---------- Toast / Notifications ---------- */
  #toast-container{position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; gap:8px; align-items:center;}
  .toast{
    padding:10px 20px; border-radius:30px; font-size:0.85rem; font-weight:600; color:#fff;
    background:rgba(20,20,40,0.95); border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    animation:floatUp 2.2s ease forwards; white-space:nowrap;
  }
  .toast.good{border-color:var(--good); color:#6ee7b7;}
  .toast.bad{border-color:var(--bad); color:#fca5a5;}
  .toast.info{border-color:var(--accent2); color:#67e8f9;}

  /* ---------- Report Screen ---------- */
  .report-hero{text-align:center; padding:30px 20px; animation:fadeUp .5s ease;}
  .score-ring{
    width:180px; height:180px; margin:0 auto 16px; border-radius:50%;
    background:conic-gradient(var(--accent2) calc(var(--pct)*1%), rgba(255,255,255,0.08) 0);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .score-ring::before{
    content:''; position:absolute; width:150px; height:150px; border-radius:50%; background:var(--bg3);
  }
  .score-ring .score-val{position:relative; font-size:2.4rem; font-weight:800; z-index:1;}
  .score-ring .score-sub{position:relative; font-size:0.7rem; color:var(--muted); z-index:1;}
  .rank-title{font-size:1.6rem; font-weight:800; margin-top:6px; background:linear-gradient(90deg,#a78bfa,#fbbf24); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .rank-sub{color:var(--muted); font-size:0.9rem; margin-top:4px;}

  .metrics-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:24px 0;}
  .metric-box{padding:14px; border-radius:12px; text-align:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);}
  .metric-box .val{font-size:1.4rem; font-weight:800; color:var(--accent2);}
  .metric-box .lbl{font-size:0.72rem; color:var(--muted); text-transform:uppercase; margin-top:2px; letter-spacing:.5px;}

  .dna-wrap{margin:24px 0;}
  .dna-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .dna-row .dna-label{width:150px; font-size:0.8rem; color:var(--muted); flex-shrink:0;}
  .dna-bar-track{flex:1; height:10px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden;}
  .dna-bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; transition:width 1s ease;}
  .dna-row .dna-pct{width:36px; text-align:right; font-size:0.78rem; font-weight:700;}

  .feedback-box{padding:16px; border-radius:12px; background:rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.3); margin:20px 0; font-size:0.9rem; line-height:1.6;}
  .milestone-box{padding:16px; border-radius:12px; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.3); margin:16px 0; font-size:0.88rem; line-height:1.6;}
  .final-prompt-box{padding:16px; border-radius:12px; background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.3); margin:16px 0; font-size:0.86rem; line-height:1.6; white-space:pre-wrap; font-family:'Consolas', monospace;}

  /* Hint button */
  .hint-btn{position:relative;}
  .hint-glow{animation:pulseGlow 1.8s infinite;}

  footer{text-align:center; color:var(--muted); font-size:0.75rem; margin-top:40px; opacity:.6;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15); border-radius:4px;}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app"></div>

<script>
(function(){
"use strict";

/* =========================================================
   SCENARIO DATA — Software Development / Intermediate
   ========================================================= */
const SCENARIO_BANK = {
  "Software Development": {
    "Intermediate": [
      {
        id:"sd_i_1",
        title:"Refactor a Legacy Function",
        desiredOutput:"A refactored version of a messy JavaScript function with clear naming, single responsibility, and comments explaining the changes — without altering its external behavior.",
        correctBlocks:[
          {tag:"Role", text:"Act as a senior JavaScript engineer performing a code review."},
          {tag:"Context", text:"Here is a legacy function that calculates order totals with nested conditionals and unclear variable names."},
          {tag:"Task", text:"Refactor the function to improve readability and maintainability without changing its output behavior."},
          {tag:"Constraints", text:"Keep the function signature identical and do not introduce new dependencies."},
          {tag:"Format", text:"Return the refactored code in a single code block followed by a bullet list of changes made."}
        ],
        distractorBlocks:[
          {tag:"Off-topic", text:"Also write unit tests for the entire application's authentication system."},
          {tag:"Vague", text:"Make the code better somehow."},
          {tag:"Scope creep", text:"Rewrite this in a completely different programming language."},
          {tag:"Irrelevant", text:"Explain the history of JavaScript as a language."}
        ],
        weakPrompt:"fix this code",
        optimizedPrompt:"Act as a senior JavaScript engineer performing a code review. Here is a legacy function that calculates order totals with nested conditionals and unclear variable names. Refactor the function to improve readability and maintainability without changing its output behavior. Keep the function signature identical and do not introduce new dependencies. Return the refactored code in a single code block followed by a bullet list of changes made.",
        overEngineeredPrompt:"Act as the world's most elite 10x senior principal staff JavaScript engineer with 30 years of experience who has reviewed millions of lines of code at every FAANG company simultaneously. Please, I beg you, refactor this code perfectly, considering every possible edge case in the universe, every design pattern ever invented, SOLID principles, DRY, KISS, YAGNI, functional programming, object-oriented programming, and also explain quantum computing while formatting the response in exactly 17 different ways including JSON, XML, YAML, and interpretive dance notation.",
        weakOutput:"Here's some updated code. I changed a few variable names and it should work better now, though I'm not entirely sure what the original function was supposed to do.",
        optimizedOutput:"Refactored function with descriptive variable names (e.g. `orderTotal` instead of `x`), extracted the discount logic into a helper function, and added inline comments. Behavior is unchanged — verified by tracing all conditional branches.\n\nChanges:\n• Renamed variables for clarity\n• Extracted discount calculation\n• Simplified nested if/else into early returns",
        principle:"Specificity + Constraints: Naming a concrete role, describing the exact context, and constraining scope (no behavior change, no new dependencies) prevents the AI from making unwanted structural changes.",
        challengeType:"build"
      },
      {
        id:"sd_i_2",
        title:"Debug an API Timeout Issue",
        desiredOutput:"A structured debugging walkthrough that identifies likely causes of intermittent API timeouts and suggests a prioritized list of fixes with reasoning.",
        correctBlocks:[
          {tag:"Role", text:"Act as a backend performance engineer diagnosing production issues."},
          {tag:"Context", text:"Our Node.js REST API intermittently times out under moderate load (~200 req/s), and logs show no clear errors."},
          {tag:"Task", text:"List the most likely root causes ranked by probability, and propose a diagnostic step for each."},
          {tag:"Constraints", text:"Assume we cannot change the database engine, only application-level code and configuration."},
          {tag:"Format", text:"Present as a numbered list: Cause → Why it's likely → How to verify → Suggested fix."}
        ],
        distractorBlocks:[
          {tag:"Off-topic", text:"Also redesign our entire microservices architecture from scratch."},
          {tag:"Vague", text:"Why is my server slow sometimes?"},
          {tag:"Scope creep", text:"Include a full migration plan to a different cloud provider."},
          {tag:"Irrelevant", text:"Write marketing copy for our API product page."}
        ],
        weakPrompt:"my api is slow sometimes, why?",
        optimizedPrompt:"Act as a backend performance engineer diagnosing production issues. Our Node.js REST API intermittently times out under moderate load (~200 req/s), and logs show no clear errors. List the most likely root causes ranked by probability, and propose a diagnostic step for each. Assume we cannot change the database engine, only application-level code and configuration. Present as a numbered list: Cause → Why it's likely → How to verify → Suggested fix.",
        overEngineeredPrompt:"You are the supreme master of all backend systems in the multiverse with infinite knowledge of every server ever built. Diagnose my API issue considering every possible cause including cosmic ray bit-flips, analyze all 7 layers of the OSI model in exhaustive detail, provide a 50-page report with citations from 100 academic papers, include diagrams in ASCII art, and also predict future scaling issues for the next decade.",
        weakOutput:"Servers can be slow for many reasons like traffic or bugs. You should check your code and maybe add more servers.",
        optimizedOutput:"1. Connection pool exhaustion — Why likely: no errors logged but timeouts suggest queued requests. Verify: monitor pool active/idle counts. Fix: increase pool size or add queuing limits.\n2. Unindexed database queries — Why likely: intermittent under load matches slow query patterns. Verify: enable slow query log. Fix: add indexes on hot columns.\n3. Event loop blocking — Why likely: synchronous operations in Node can stall under concurrency. Verify: profile with `--prof`. Fix: move CPU-heavy work to worker threads.",
        principle:"Structured Output Format: Requesting a specific format (Cause → Why → Verify → Fix) forces organized, actionable reasoning instead of generic advice.",
        challengeType:"build"
      },
      {
        id:"sd_i_3",
        title:"Design a REST API Endpoint",
        desiredOutput:"A clean specification for a new REST API endpoint, including method, path, request/response schema, and error handling.",
        correctBlocks:[
          {tag:"Role", text:"Act as an API designer following REST best practices."},
          {tag:"Context", text:"We need an endpoint for users to update their notification preferences in a settings service."},
          {tag:"Task", text:"Design the endpoint including HTTP method, URL path, request body schema, response schema, and status codes."},
          {tag:"Constraints", text:"Follow existing convention: plural resource names, camelCase JSON fields, versioned under /api/v1."},
          {tag:"Format", text:"Present as a markdown spec with sections: Endpoint, Request, Response, Errors."}
        ],
        distractorBlocks:[
          {tag:"Off-topic", text:"Also generate the full database schema for the entire application."},
          {tag:"Vague", text:"Make an API for settings."},
          {tag:"Scope creep", text:"Include a GraphQL version and a gRPC version as well."},
          {tag:"Irrelevant", text:"Write a blog post about REST vs SOAP."}
        ],
        weakPrompt:"make an api for user settings",
        optimizedPrompt:"Act as an API designer following REST best practices. We need an endpoint for users to update their notification preferences in a settings service. Design the endpoint including HTTP method, URL path, request body schema, response schema, and status codes. Follow existing convention: plural resource names, camelCase JSON fields, versioned under /api/v1. Present as a markdown spec with sections: Endpoint, Request, Response, Errors.",
        overEngineeredPrompt:"As the ultimate API architect god who has designed every API in existence, create the most comprehensive, over-engineered, enterprise-grade, hyperscale, planet-scale API specification including rate limiting algorithms, full OAuth2 flow diagrams, a complete OpenAPI 3.1 document, versioning strategy for the next 50 years, and translate the documentation into 12 languages.",
        weakOutput:"You could make a PUT endpoint like /settings that takes some data and updates it. Return success or error.",
        optimizedOutput:"### Endpoint\nPUT /api/v1/users/{userId}/notification-preferences\n\n### Request\n```json\n{ \"emailEnabled\": true, \"smsEnabled\": false, \"pushEnabled\": true }\n```\n\n### Response (200)\n```json\n{ \"userId\": \"123\", \"emailEnabled\": true, \"smsEnabled\": false, \"pushEnabled\": true, \"updatedAt\": \"2026-07-20T10:00:00Z\" }\n```\n\n### Errors\n- 400 Bad Request — invalid field types\n- 404 Not Found — user does not exist\n- 401 Unauthorized — missing/invalid token",
        principle:"Convention Grounding: Specifying existing naming/versioning conventions keeps AI output consistent with your codebase instead of inventing its own style.",
        challengeType:"build"
      },
      {
        id:"sd_i_4",
        title:"Clean Up a Bloated Debugging Prompt",
        desiredOutput:"A concise, focused prompt asking the AI to find the cause of a null pointer exception in a Java method, with a working prompt free of noise and contradictions.",
        weakPromptChunks:[
          {text:"Act as a Java expert and also a UI designer and also a project manager all at once.", weak:true},
          {text:"Here's a NullPointerException stack trace from our order processing service.", weak:false},

// Fallback generic bank used if a domain/difficulty combo isn't explicitly authored
function getScenarios(domain, difficulty){
  const domainBank = SCENARIO_BANK[domain];
  if(domainBank && domainBank[difficulty]) return domainBank[difficulty];
  // fallback: use Software Development Intermediate as base pattern but relabel
  const base = SCENARIO_BANK["Software Development"]["Intermediate"];
  return base;
}

/* =========================================================
   INIT GAME
   ========================================================= */
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function initGame(){
  const pool = getScenarios(STATE.domain, STATE.difficulty);
  STATE.scenarios = shuffle(pool).slice(0, Math.min(6, pool.length));
  STATE.totalScenarios = STATE.scenarios.length;
  STATE.currentIndex = 0;
  STATE.startTime = Date.now();
  STATE.moves = 0;
  STATE.wrongPlacements = 0;
  STATE.hintsUsed = 0;
  STATE.correctCount = 0;
  STATE.partialCount = 0;
  STATE.perScenarioScores = [];
  STATE.optimizationBonusTotal = 0;
  toast("Puzzle started! Good luck 🚀", "info");
  renderScenario();
}

/* =========================================================
   HEADER STATS BAR (shared across scenario screens)
   ========================================================= */
function renderStatsBar(){
  const elapsed = Math.floor((Date.now() - STATE.startTime)/1000);
  const mm = String(Math.floor(elapsed/60)).padStart(2,"0");
  const ss = String(elapsed%60).padStart(2,"0");
  return `
    <div class="stats-bar">
      <div class="stat-chip">⏱ <b id="stat-time">${mm}:${ss}</b></div>
      <div class="stat-chip">🎯 Accuracy <b>${accuracyPct()}%</b></div>
      <div class="stat-chip">🧮 Moves <b>${STATE.moves}</b></div>
      <div class="stat-chip">❌ Wrong <b>${STATE.wrongPlacements}</b></div>
      <div class="stat-chip">💡 Hints <b>${STATE.hintsUsed}</b></div>
    </div>
  `;
}
function accuracyPct(){
  const attempted = STATE.currentIndex + (STATE.answeredCurrent?0:0);
  if(STATE.currentIndex === 0) return 100;
  return Math.round((STATE.correctCount / STATE.currentIndex) * 100);
}

let timeInterval = null;
function startTimeTicker(){
  clearInterval(timeInterval);
  timeInterval = setInterval(()=>{
    const el = document.getElementById("stat-time");
    if(!el){ clearInterval(timeInterval); return; }
    const elapsed = Math.floor((Date.now() - STATE.startTime)/1000);
    const mm = String(Math.floor(elapsed/60)).padStart(2,"0");
    const ss = String(elapsed%60).padStart(2,"0");
    el.textContent = `${mm}:${ss}`;
  }, 1000);
}

/* =========================================================
   RENDER SCENARIO ROUTER
   ========================================================= */
function renderScenario(){
  STATE.answeredCurrent = false;
  STATE.scenarioStartTime = Date.now();
  const s = STATE.scenarios[STATE.currentIndex];
  const pct = Math.round((STATE.currentIndex / STATE.totalScenarios) * 100);

  const wrapper = document.createElement("div");
  wrapper.innerHTML = `
    <div class="app-header" style="padding:10px 0 18px;">
      <h1 style="font-size:1.5rem;">🧩 Prompt Puzzle</h1>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${STATE.currentIndex+1} / ${STATE.totalScenarios}</div>
    </div>
    ${renderStatsBar()}
    <div class="card" id="scenario-card"></div>
  `;
  app.innerHTML = "";
  app.appendChild(wrapper);
  startTimeTicker();

  const card = document.getElementById("scenario-card");
  if(s.challengeType === "build") renderBuildChallenge(card, s);
  else if(s.challengeType === "clean") renderCleanChallenge(card, s);
  else if(s.challengeType === "choose") renderChooseChallenge(card, s);
}

function typeBadge(type){
  if(type==="build") return `<span class="badge type-build">🧱 Build the Prompt</span>`;
  if(type==="clean") return `<span class="badge type-clean">🧹 Clean the Prompt</span>`;
  if(type==="choose") return `<span class="badge type-choose">✅ Choose the Best</span>`;
  return "";
}

/* =========================================================
   CHALLENGE 1: BUILD THE PROMPT (drag and drop)
   ========================================================= */
function renderBuildChallenge(card, s){
  const allBlocks = shuffle([
    ...s.correctBlocks.map(b=>({...b, correct:true})),
    ...s.distractorBlocks.map(b=>({...b, correct:false}))
  ]);

  card.innerHTML = `
    <div class="scenario-header">
      ${typeBadge("build")}
      <div class="scenario-title">${s.title}</div>
      <div class="scenario-desc">Drag the correct prompt blocks into the "Your Prompt" zone, in a logical order. Avoid distractor blocks — they add noise or scope creep.</div>
      <div class="desired-output"><b>🎯 Desired Output:</b> ${s.desiredOutput}</div>
    </div>
    <div class="dnd-area">
      <div class="dnd-col">
        <h4>📦 Available Blocks</h4>
        <div class="block-pool" id="pool"></div>
      </div>
      <div class="dnd-col">
        <h4>✨ Your Prompt (drop here)</h4>
        <div class="drop-zone" id="dropzone"></div>
      </div>
    </div>
    <div class="actions-row">
      <button class="btn secondary small hint-btn" id="hint-btn">💡 Use Hint</button>
      <button class="btn" id="submit-btn" disabled>Check My Prompt</button>
    </div>
    <div class="feedback-panel" id="feedback"></div>
  `;

  const pool = document.getElementById("pool");
  const dropzone = document.getElementById("dropzone");

  allBlocks.forEach((b,i)=>{
    const el = document.createElement("div");
    el.className = "block";
    el.draggable = true;
    el.dataset.correct = b.correct;
    el.dataset.idx = i;
    el.innerHTML = `<span class="tag">${b.tag}</span>${b.text}`;
    attachDnD(el, pool, dropzone);
    pool.appendChild(el);
  });

  [pool, dropzone].forEach(zone=>{
    zone.addEventListener("dragover", e=>{ e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", ()=> zone.classList.remove("dragover"));
    zone.addEventListener("drop", e=>{
      e.preventDefault();
      zone.classList.remove("dragover");
      const dragging = document.querySelector(".dragging");
      if(dragging){
        zone.appendChild(dragging);
        STATE.moves++;
        updateStatsDisplay();
        checkBuildReady();
      }
    });
  });

  function checkBuildReady(){
    document.getElementById("submit-btn").disabled = dropzone.children.length === 0;
  }

  document.getElementById("hint-btn").onclick = ()=>{
    STATE.hintsUsed++;
    updateStatsDisplay();
    // highlight a correct block still in pool
    const remaining = [...pool.querySelectorAll(".block")].filter(b=>b.dataset.correct==="true");
    if(remaining.length){
      remaining[0].style.boxShadow = "0 0 0 3px var(--accent3)";
      toast("Hint: try that glowing block next 💡", "info");
    } else {
      toast("You've already placed all correct blocks!", "info");
    }
  };

  document.getElementById("submit-btn").onclick = ()=>{
    if(STATE.answeredCurrent) return;
    STATE.answeredCurrent = true;
    const placed = [...dropzone.children];
    let correctPlaced = 0, wrongPlaced = 0;
    placed.forEach(el=>{
      if(el.dataset.correct === "true"){ correctPlaced++; el.classList.add("correct-flash"); }
      else { wrongPlaced++; el.classList.add("wrong-flash"); STATE.wrongPlacements++; }
    });
    const missedCorrect = s.correctBlocks.length - correctPlaced;
    const total = s.correctBlocks.length;
    const scorePct = Math.max(0, Math.round(((correctPlaced - wrongPlaced) / total) * 100));
    const isFullyCorrect = correctPlaced === total && wrongPlaced === 0;
    const isPartial = correctPlaced > 0 && !isFullyCorrect;

    if(isFullyCorrect){ STATE.correctCount++; toast("Perfect prompt structure! ✅", "good"); }
    else if(isPartial){ STATE.partialCount++; toast("Partially correct — review the feedback", "bad"); }
    else { toast("Needs work — check the principle below", "bad"); }

    const bonus = wrongPlaced === 0 && STATE.hintsUsed === 0 ? 15 : (wrongPlaced===0?8:0);
    STATE.optimizationBonusTotal += bonus;

    STATE.perScenarioScores.push({
      title:s.title, scorePct, correctPlaced, total, wrongPlaced, bonus,
      timeSpent: Math.round((Date.now()-STATE.scenarioStartTime)/1000)
    });

    document.getElementById("submit-btn").disabled = true;
    renderFeedback(s, isFullyCorrect ? "correct" : "partial", scorePct);
    updateStatsDisplay();
  };
}

function attachDnD(el, pool, dropzone){
  el.addEventListener("dragstart", ()=>{ el.classList.add("dragging"); });
  el.addEventListener("dragend", ()=>{ el.classList.remove("dragging"); });
}

/* =========================================================
   CHALLENGE 2: CLEAN THE PROMPT (click to remove weak chunks)
   ========================================================= */
function renderCleanChallenge(card, s){
  card.innerHTML = `
    <div class="scenario-header">
      ${typeBadge("clean")}
      <div class="scenario-title">${s.title}</div>
      <div class="scenario-desc">This prompt is bloated with noise, contradictions, and off-topic requests. Click each weak/irrelevant chunk to remove it, leaving only the clean, effective prompt.</div>
      <div class="desired-output"><b>🎯 Desired Output:</b> ${s.desiredOutput}</div>
    </div>
    <div class="clean-text" id="clean-text"></div>
    <div class="actions-row">
      <button class="btn secondary small hint-btn" id="hint-btn">💡 Use Hint</button>
      <button class="btn" id="submit-btn">Check My Cleanup</button>
    </div>
    <div class="feedback-panel" id="feedback"></div>
  `;

  const container = document.getElementById("clean-text");
  s.weakPromptChunks.forEach((c, i)=>{
    const span = document.createElement("span");
    span.className = "chunk " + (c.weak ? "weak" : "good");
    span.textContent = c.text;
    span.dataset.weak = c.weak;
    span.dataset.removed = "false";
    if(c.weak){
      span.onclick = ()=>{
        if(span.dataset.removed === "true") return;
        span.dataset.removed = "true";
        span.classList.add("removed");
        STATE.moves++;
        updateStatsDisplay();
        toast("Removed noise ✂️", "good");
      };
    }
    container.appendChild(span);
    container.appendChild(document.createTextNode(" "));
  });

  document.getElementById("hint-btn").onclick = ()=>{
    STATE.hintsUsed++;
    updateStatsDisplay();
    const remaining = [...container.querySelectorAll(".chunk.weak")].filter(c=>c.dataset.removed==="false");
    if(remaining.length){
      remaining[0].style.boxShadow = "0 0 0 3px var(--accent3)";
      toast("Hint: that glowing chunk should go 💡", "info");
    } else {
      toast("All weak chunks already removed!", "info");
    }
  };

  document.getElementById("submit-btn").onclick = ()=>{
    if(STATE.answeredCurrent) return;
    STATE.answeredCurrent = true;
    const chunks = [...container.querySelectorAll(".chunk")];
    let correctRemovals = 0, wrongRemovals = 0, missedWeak = 0;
    chunks.forEach(c=>{
      const isWeak = c.dataset.weak === "true";
      const removed = c.dataset.removed === "true";
      if(isWeak && removed) correctRemovals++;
      else if(isWeak && !removed) missedWeak++;
      else if(!isWeak && removed) wrongRemovals++;
    });
    if(wrongRemovals>0) STATE.wrongPlacements += wrongRemovals;
    const totalWeak = s.weakPromptChunks.filter(c=>c.weak).length;
    const scorePct = Math.max(0, Math.round(((correctRemovals - wrongRemovals) / totalWeak) * 100));
    const isFullyCorrect = correctRemovals === totalWeak && wrongRemovals === 0;
    const isPartial = correctRemovals > 0 && !isFullyCorrect;

    if(isFullyCorrect){ STATE.correctCount++; toast("Prompt fully cleaned! ✨", "good"); }
    else if(isPartial){ STATE.partialCount++; toast("Good progress, some noise remains", "bad"); }
    else { toast("Try again next time — check feedback", "bad"); }

    const bonus = wrongRemovals === 0 && STATE.hintsUsed === 0 ? 15 : (wrongRemovals===0?8:0);
    STATE.optimizationBonusTotal += bonus;

    STATE.perScenarioScores.push({
      title:s.title, scorePct, correctPlaced:correctRemovals, total:totalWeak, wrongPlaced:wrongRemovals, bonus,
      timeSpent: Math.round((Date.now()-STATE.scenarioStartTime)/1000)
    });

    document.getElementById("submit-btn").disabled = true;
    renderFeedback(s, isFullyCorrect ? "correct" : "partial", scorePct);
    updateStatsDisplay();
  };
}

  const grid = document.getElementById("choice-grid");
  choices.forEach(c=>{

      if(STATE.answeredCurrent) return;

        toast("Excellent choice! That's the optimal prompt ✅", "good");
      } else {
        el.classList.add("chosen-wrong");
        STATE.wrongPlacements++;
        STATE.partialCount++;
        toast(c.quality === "weak" ? "Too vague — check feedback" : "Over-engineered — check feedback", "bad");
        // reveal correct one
        [...grid.children].forEach((x,i)=>{
          if(choices[i].quality === "optimal") x.classList.add("chosen-correct");
        });
      }
      const scorePct = isOptimal ? 100 : 40;
      const bonus = isOptimal && STATE.hintsUsed === 0 ? 15 : (isOptimal?8:0);
      STATE.optimizationBonusTotal += bonus;
      STATE.perScenarioScores.push({
        title:s.title, scorePct, correctPlaced:isOptimal?1:0, total:1, wrongPlaced:isOptimal?0:1, bonus,
        timeSpent: Math.round((Date.now()-STATE.scenarioStartTime)/1000)
      });
      updateStatsDisplay();
      renderFeedback(s, isOptimal ? "correct" : "partial", scorePct, c);
    };
    grid.appendChild(el);
  });

  document.getElementById("hint-btn").onclick = ()=>{
    STATE.hintsUsed++;
    updateStatsDisplay();
    toast("Hint: look for balance — enough detail, no excess 💡", "info");
  };
}

/* =========================================================
   FEEDBACK PANEL (shared)
   ========================================================= */
function renderFeedback(s, kind, scorePct, chosenChoice){
  const panel = document.getElementById("feedback");
  panel.className = "feedback-panel show " + kind;
  const isLast = STATE.currentIndex === STATE.totalScenarios - 1;
  let choiceReasonHtml = "";
  if(chosenChoice){
    choiceReasonHtml = `<div style="margin-top:8px; font-size:0.85rem;"><b>Why:</b> ${chosenChoice.reason}</div>`;
  }
  panel.innerHTML = `
    <div style="font-weight:700; font-size:1rem;">${kind==="correct" ? "✅ Great work!" : "⚠️ Let's review"} — Score: ${scorePct}%</div>
    ${choiceReasonHtml}
    <div class="out-compare">
      <div class="out-box weak"><span class="lbl">Weak Prompt Result</span>${s.weakOutput}</div>
      <div class="out-box opt"><span class="lbl">Optimized Prompt Result</span>${s.optimizedOutput}</div>
    </div>
    <div class="principle">📘 <b>Prompt Principle:</b> ${s.principle}</div>
    <div style="text-align:right; margin-top:14px;">
      <button class="btn" id="next-btn">${isLast ? "See My Report →" : "Next Scenario →"}</button>
    </div>
  `;
  document.getElementById("next-btn").onclick = ()=>{
    if(isLast) renderReport();
    else {
      STATE.currentIndex++;
      renderScenario();
    }
  };
  panel.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function updateStatsDisplay(){
  // re-render just the stats chips values in place if present
  const bar = document.querySelector(".stats-bar");
  if(!bar) return;
  const chips = bar.querySelectorAll(".stat-chip b");
  if(chips[1]) chips[1].textContent = accuracyPct() + "%";
  if(chips[2]) chips[2].textContent = STATE.moves;
  if(chips[3]) chips[3].textContent = STATE.wrongPlacements;
  if(chips[4]) chips[4].textContent = STATE.hintsUsed;
}

/* =========================================================
   FINAL REPORT
   ========================================================= */
function computeReport(){
  const totalTime = Math.round((Date.now() - STATE.startTime)/1000);
  const avgScorePct = Math.round(
    STATE.perScenarioScores.reduce((sum,s)=>sum+s.scorePct,0) / STATE.perScenarioScores.length
  );
  const timeEfficiency = Math.max(0, 100 - Math.min(100, Math.floor(totalTime / STATE.totalScenarios / 2)));
  const hintPenalty = STATE.hintsUsed * 3;
  const wrongPenalty = STATE.wrongPlacements * 2;
  let promptScore = Math.round(avgScorePct*0.6 + timeEfficiency*0.15 + STATE.optimizationBonusTotal*0.6/STATE.totalScenarios*4);
  promptScore = Math.max(0, Math.min(100, promptScore - hintPenalty*0 - Math.min(20,wrongPenalty*0.5)));
  promptScore = Math.round(promptScore);

  let rank, rating, ranking_emoji;
  if(promptScore >= 90){ rank="Prompt Architect"; rating="Elite"; ranking_emoji="🏆"; }
  else if(promptScore >= 75){ rank="Prompt Engineer"; rating="Excellent"; ranking_emoji="🥇"; }
  else if(promptScore >= 60){ rank="Prompt Practitioner"; rating="Solid"; ranking_emoji="🥈"; }
  else if(promptScore >= 40){ rank="Prompt Apprentice"; rating="Developing"; ranking_emoji="🥉"; }
  else { rank="Prompt Novice"; rating="Just Getting Started"; ranking_emoji="🌱"; }

  // Prompt DNA: derive pseudo-dimensions from performance
  const dna = {
    "Clarity": Math.min(100, avgScorePct + (STATE.wrongPlacements===0?10:0)),
    "Specificity": Math.min(100, Math.round(avgScorePct*0.9 + (STATE.hintsUsed===0?10:0))),
    "Constraint Use": Math.min(100, Math.round((STATE.correctCount/STATE.totalScenarios)*100)),
    "Format Control": Math.min(100, avgScorePct),
    "Efficiency": timeEfficiency,
    "Optimization Instinct": Math.min(100, Math.round(STATE.optimizationBonusTotal / STATE.totalScenarios / 15 * 100))
  };

  return {totalTime, avgScorePct, promptScore, rank, rating, ranking_emoji, dna};
}

function renderReport(){
  clearInterval(timeInterval);
  const r = computeReport();
  const mm = String(Math.floor(r.totalTime/60)).padStart(2,"0");
  const ss = String(r.totalTime%60).padStart(2,"0");

  let feedback = "";
  if(r.promptScore >= 85){
    feedback = "You consistently structure prompts with clear roles, precise context, and well-defined constraints. Your instinct to avoid both vague and over-engineered prompts is a hallmark of expert prompting.";
  } else if(r.promptScore >= 65){
    feedback = "You have a strong grasp of prompt structure. Focus next on tightening constraints and format specifications to reduce ambiguity in AI outputs.";
  } else if(r.promptScore >= 40){
    feedback = "You're building solid fundamentals. Pay closer attention to distractor blocks and noisy phrasing — they're the biggest source of wasted prompt effort.";
  } else {
    feedback = "You're just starting your prompting journey. Revisit the Prompt Principles in each scenario's feedback — they're the fastest way to level up.";
  }

  let milestone = "";
  if(r.promptScore < 60) milestone = "🎯 Next Milestone: Reach 60+ to unlock 'Prompt Practitioner' rank by minimizing wrong placements.";
  else if(r.promptScore < 75) milestone = "🎯 Next Milestone: Reach 75+ to unlock 'Prompt Engineer' rank by using fewer hints and avoiding over-engineering.";
  else if(r.promptScore < 90) milestone = "🎯 Next Milestone: Reach 90+ to unlock 'Prompt Architect' — the top rank — with a flawless, hint-free run.";
  else milestone = "🎯 You've reached the top rank! Try a new domain or difficulty to keep sharpening your skills.";

  // pick a representative final optimized prompt from last scenario
  const lastScenario = STATE.scenarios[STATE.scenarios.length-1];
  const finalPrompt = lastScenario.optimizedPrompt;

  app.innerHTML = `
    <div class="app-header"><h1 style="font-size:1.6rem;">📊 Prompt Performance Report</h1></div>
    <div class="card report-hero">
      <div class="score-ring" style="--pct:${r.promptScore}">
        <div class="score-val">${r.promptScore}</div>
      </div>
      <div class="score-sub" style="margin-top:-10px; color:var(--muted); font-size:0.8rem;">PROMPT SCORE</div>
      <div class="rank-title">${r.ranking_emoji} ${r.rank}</div>
      <div class="rank-sub">Rating: ${r.rating} · Domain: ${STATE.domain} · Difficulty: ${STATE.difficulty}</div>

      <div class="metrics-grid">
        <div class="metric-box"><div class="val">${r.avgScorePct}%</div><div class="lbl">Accuracy</div></div>
        <div class="metric-box"><div class="val">${mm}:${ss}</div><div class="lbl">Time</div></div>
        <div class="metric-box"><div class="val">${STATE.moves}</div><div class="lbl">Moves</div></div>
        <div class="metric-box"><div class="val">${STATE.wrongPlacements}</div><div class="lbl">Wrong Placements</div></div>
        <div class="metric-box"><div class="val">${STATE.hintsUsed}</div><div class="lbl">Hints Used</div></div>
        <div class="metric-box"><div class="val">+${STATE.optimizationBonusTotal}</div><div class="lbl">Optimization Bonus</div></div>
      </div>

      <div style="text-align:left;">
        <div class="section-label">🧬 Prompt DNA</div>
        <div class="dna-wrap" id="dna-wrap"></div>
      </div>

      <div class="feedback-box" style="text-align:left;"><b>💬 Personalized Feedback</b><br>${feedback}</div>
      <div class="milestone-box" style="text-align:left;">${milestone}</div>

      <div style="text-align:left;">
        <div class="section-label">🏁 Final Optimized Prompt Example</div>
        <div class="final-prompt-box">${finalPrompt}</div>
      </div>

      <div class="actions-row" style="justify-content:center; margin-top:24px;">
        <button class="btn" id="replay-btn">🔁 Replay with New Scenarios</button>
        <button class="btn secondary" id="new-setup-btn">🔀 Change Domain / Difficulty</button>
      </div>
    </div>
    <footer>🧩 Prompt Puzzle — keep practicing to master the art of prompting.</footer>
  `;

  const dnaWrap = document.getElementById("dna-wrap");
  Object.entries(r.dna).forEach(([label, val])=>{
    const row = document.createElement("div");
    row.className = "dna-row";
    row.innerHTML = `
      <div class="dna-label">${label}</div>
      <div class="dna-bar-track"><div class="dna-bar-fill" data-val="${val}"></div></div>
      <div class="dna-pct">${val}%</div>
    `;
    dnaWrap.appendChild(row);
  });
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      dnaWrap.querySelectorAll(".dna-bar-fill").forEach(el=>{
        el.style.width = el.dataset.val + "%";
      });
    }, 100);
  });

  document.getElementById("replay-btn").onclick = ()=>{
    toast("New scenarios loaded! 🔁", "info");
    initGame();
  };
  document.getElementById("new-setup-btn").onclick = renderSetup;
}

/* =========================================================
   BOOT
   ========================================================= */
renderSetup();

})();
</script>
</body>
</html>
